workflows:
  - id: project-kickoff
    agents: [business-analyst, project-manager, enterprise-architect, delivery-manager]
    description: Início de projeto — levantamento de requisitos, arquitetura e plano

  - id: sprint-execution
    agents: [dev, data-engineer, sdet, devops]
    description: Execução de sprint — desenvolvimento, testes e deploy

  - id: security-review
    agents: [security-architect, sre, sdet]
    description: Review de segurança e performance pré-release

  - id: ux-discovery
    agents: [ux-research-lead, pixel, ux-design-expert, pm]
    description: Descoberta UX — pesquisa, persona, design system e protótipo

  - id: client-delivery
    agents: [project-manager, dev, tech-writer, delivery-manager]
    description: Entrega de projeto — documentação, handoff e aceite do cliente

  - id: incident-response
    agents: [sre, devops, security-architect, dev]
    description: Resposta a incidentes de produção

