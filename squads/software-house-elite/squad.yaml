name: software-house-elite
version: 2.3.0
description: |
  Squad de entrega da software house — projetos de clientes externos.
  Cobre análise de negócio, gestão de projetos, arquitetura enterprise,
  liderança técnica, qualidade, SRE, segurança e UX research.
  Projetado para times de entrega enxutos com alta especialização técnica.
domain: software-house
author: "@dev (Dex)"
created_at: "2026-04-03"
updated_at: "2026-04-22"
aios_version: "2.1.0"

changelog:
  - version: "2.3.0"
    date: "2026-04-22"
    changes:
      - "Removido: tech-lead (Kai) — redundante com @dev (Dex)"
      - "Atualizado workflows: sprint-execution, client-delivery, incident-response substituem tech-lead por dev"
      - "Confirmado: pixel (Pixel) integrado ao squad via ref global (~/.claude/agents/pixel.md)"
  - version: "2.2.0"
    date: "2026-04-22"
    changes:
      - "Adicionados todos os refs AIOX core: @architect, @qa, @sm, @po, @analyst"
      - "Adicionado: icarus (Icarus) — Super Engenheiro de Prompt, agente global"
      - "Squad passa a ser o hub central de todos os agentes AIOX + especialistas"
  - version: "2.1.0"
    date: "2026-04-21"
    changes:
      - "Adicionados: n8n-dev (Nix), ai-engineer (Aiden), frontend-specialist (Arc) — versões BASE sem contexto de produto"
  - version: "2.0.0"
    date: "2026-04-18"
    changes:
      - "Reorganização estrutural — separação de contextos por squad dedicado"
      - "Removidos: pmo-director, risk-manager (prematuros para estágio atual)"
      - "Movidos para esteticaia-produto: n8n-dev, ai-engineer, icarus"
      - "Movidos para esteticaia-comercial: sales-engineer, tam, customer-success"
      - "Adicionados: business-analyst, project-manager, tech-writer"
  - version: "1.1.0"
    date: "2026-04-06"
    changes:
      - "Adicionado agente @n8n-dev (Nix)"
      - "Corrigido tech-stack.md"
      - "Criados task files de engenharia"

