name: ml-ia-padroes-squad
version: 0.1.0
description: Identifica padrões, extrai insights e valida comportamentos a partir dos dados estruturados — coração do laboratório ML
author: Synkra AIOX
license: MIT
slashPrefix: ml-ia-padroes

aiox:
  minVersion: "2.1.0"
  type: squad
  level: 2-building
  project: machine-learning

isolation:
  namespace: ml
  postgres_schema: ml_padroes
  redis_prefix: "ml:padroes:"
  n8n_tag: "[ML-PADROES]"
  railway_service: ml-ia-padroes

components:
  agents:
    - pattern-extractor.md
    - behavior-analyst.md
    - benchmark-generator.md
    - assertiveness-analyzer.md
    - response-variation-cataloger.md
    - knowledge-gap-detector.md
    - feedback-collector.md
    - benchmark-calibrator.md
    - response-pre-validator.md
  tasks:
    - extract-patterns.md
    - analyze-behavior.md
    - generate-benchmarks.md
  workflows: []
  checklists: []
  templates: []

dependencies:
  squads:
    - ml-captura-squad
    - ml-data-eng-squad
  services:
    - Postgres (schema: ml_padroes)
    - Claude Haiku
    - Claude Sonnet
    - Redis

keywords:
  - ml
  - ia
  - padroes
  - comportamento
  - benchmark
  - refinamento
