name: ml-ia-padroes-squad
version: 0.1.0
description: Identifica padrões, extrai insights e valida comportamentos a partir dos dados estruturados — coração do laboratório ML
author: Synkra AIOX
license: MIT
slashPrefix: ml-ia-padroes

aiox:
  minVersion: "2.1.0"
  type: squad
  level: 2-building
  project: machine-learning

isolation:
  namespace: ml
  postgres_schema: ml_padroes
  redis_prefix: "ml:padroes:"
  n8n_tag: "[ML-PADROES]"
  railway_service: ml-ia-padroes

components:
  agents:
    - agents/pattern-extractor.md
    - agents/behavior-analyst.md
    - agents/benchmark-generator.md
    - agents/assertiveness-analyzer.md
    - agents/response-variation-cataloger.md
    - agents/knowledge-gap-detector.md
    - agents/feedback-collector.md
    - agents/benchmark-calibrator.md
  tasks:
    - tasks/extract-patterns.md
    - tasks/analyze-behavior.md
    - tasks/generate-benchmarks.md
  workflows: []
  checklists: []
  templates: []

dependencies:
  squads:
    - ml-captura-squad
    - ml-data-eng-squad
  services:
    - Postgres (schema: ml_padroes)
    - Claude Haiku
    - Claude Sonnet
    - Redis

keywords:
  - ml
  - ia
  - padroes
  - comportamento
  - benchmark
  - refinamento
