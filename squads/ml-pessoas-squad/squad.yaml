name: ml-pessoas-squad
version: 0.1.0
description: Squad operacional de gestão de pessoas — perfil ideal por função, padrões de engajamento, onboarding e retenção de talentos
author: Synkra AIOX
license: MIT
slashPrefix: ml-pessoas

aiox:
  minVersion: "2.1.0"
  type: squad
  level: 1-operational
  project: machine-learning
  status: planned
  priority: 6

isolation:
  namespace: ml
  postgres_schema: ml_pessoas
  redis_prefix: "ml:pessoas:"
  n8n_tag: "[ML-PESSOAS]"
  railway_service: ml-pessoas

data_sources:
  - Dados de performance por função
  - Registros de onboarding
  - Histórico de turnover

intelligence_generated:
  - Perfil ideal por função
  - Padrões de engajamento e produtividade
  - Sinais de risco de desligamento
  - Melhores práticas de onboarding

components:
  agents:
    - talent-profiler.md
    - engagement-monitor.md
    - onboarding-advisor.md
  tasks:
    - profile-talent.md
    - analyze-engagement.md
    - generate-onboarding-plan.md
  workflows: []
  checklists: []
  templates: []

dependencies:
  squads:
    - ml-captura-squad
    - ml-data-eng-squad
    - ml-ia-padroes-squad
  services:
    - Postgres (schema: ml_pessoas)
    - Redis

keywords:
  - ml
  - pessoas
  - rh
  - perfil
  - engajamento
  - onboarding
  - turnover
