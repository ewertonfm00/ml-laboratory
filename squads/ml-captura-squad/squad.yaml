name: ml-captura-squad
title: "Esteira de Captura"
version: 0.1.0
description: Captura dados brutos de WhatsApp, áudio e eventos de todas as fontes do laboratório ML
author: Synkra AIOX
license: MIT
slashPrefix: ml-captura

aiox:
  minVersion: "2.1.0"
  type: squad
  level: 2-building
  project: machine-learning

isolation:
  namespace: ml
  postgres_schema: ml_captura
  redis_prefix: "ml:captura:"
  n8n_tag: "[ML-CAPTURA]"
  railway_service: ml-captura

components:
  agents:
    - webhook-manager.md
    - audio-transcriber.md
    - message-collector.md
    - technical-content-loader.md
    - privacy-filter.md
    - multi-source-collector.md
    - pipeline-debugger.md
    - whatsapp-recovery-agent.md
    - n8n-encoding-sanitizer.md
    - whatsapp-webhook-validator.md
  tasks:
    - configure-webhook.md
    - transcribe-audio.md
    - collect-messages.md
  workflows: []
  checklists: []
  templates: []

dependencies:
  squads: []
  services:
    - Evolution API
    - n8n (Railway)
    - Groq Whisper
    - Postgres (schema: ml_captura)
    - Redis
    - Google Drive (opcional, multi-source-collector)
    - Gmail IMAP (opcional, multi-source-collector)

keywords:
  - ml
  - captura
  - whatsapp
  - evolution-api
  - n8n
  - webhook
  - groq-whisper
