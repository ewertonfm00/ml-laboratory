name: ml-operacional-squad
version: 0.1.0
description: Squad operacional da área de operações — identifica gargalos, padrões de falha e oportunidades de otimização de processos
author: Synkra AIOX
license: MIT
slashPrefix: ml-operacional

aiox:
  minVersion: "2.1.0"
  type: squad
  level: 1-operational
  project: machine-learning
  status: planned
  priority: 2

isolation:
  namespace: ml
  postgres_schema: ml_operacional
  redis_prefix: "ml:operacional:"
  n8n_tag: "[ML-OPERACIONAL]"
  railway_service: ml-operacional

data_sources:
  - Processos internos
  - Registros de entrega
  - SLA e métricas operacionais

intelligence_generated:
  - Gargalos de processo
  - Padrões de falha
  - Otimização de fluxos
  - Alertas preventivos operacionais

components:
  agents:
    - process-analyst.md
    - failure-detector.md
    - optimization-advisor.md
  tasks:
    - map-process.md
    - detect-bottlenecks.md
    - generate-optimization-report.md
  workflows: []
  checklists: []
  templates: []

dependencies:
  squads:
    - ml-captura-squad
    - ml-data-eng-squad
    - ml-ia-padroes-squad
  services:
    - Postgres (schema: ml_operacional)
    - Redis

keywords:
  - ml
  - operacional
  - processos
  - gargalos
  - otimizacao
  - sla
